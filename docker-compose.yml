#
# Repo with the Dockerfile:
#
services:
  comfyui:
    build:
      context: ./comfyui-gfx1151
      args:
        COMFYUI_REF: v0.15.0
    image: comfyui-gfx1151:v0.15.0
    container_name: comfyui-gfx1151
    restart: always
    shm_size: 8G
    volumes:
      - ./ComfyUI/models:/opt/ComfyUI/models
      - ./ComfyUI/input:/opt/ComfyUI/input
      - ./ComfyUI/output:/opt/ComfyUI/output
      - ./ComfyUI/user/default/workflows:/opt/ComfyUI/user/default/workflows
    environment:
      - TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL=1
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined

